  <style>

      --teal: #00838F; --teal-dim: rgba(0,131,143,0.15);

      --radius: 14px; --transition: 0.3s cubic-bezier(0.32, 0.72, 0, 1);

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; height: 100%; }
    body {

    #app { display: flex; flex-direction: column; height: 100dvh; position: relative; z-index: 1; }

    .ambient { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .orb { position: absolute; border-radius: 50%; filter: blur(120px); will-change: transform; opacity: 0.06; }
    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, var(--purple), transparent 70%); top: -20%; right: -10%; animation: drift1 30s ease-in-out infinite; }
    .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, var(--teal), transparent 70%); bottom: -15%; left: -10%; animation: drift2 25s ease-in-out infinite; }
    .orb-3 { width: 400px; height: 400px; background: radial-gradient(circle, #9BD732, transparent 70%); top: 40%; left: 50%; animation: drift3 35s ease-in-out infinite; }
    @keyframes drift1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-80px, 60px); } }
    @keyframes drift2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(60px,-50px); } }

    .grid-overlay {

    .slide {

    .slide.exit-right { transform: translateX(50px); opacity: 0; pointer-events: none; }
    .slide.enter-right { transform: translateX(50px); opacity: 0; pointer-events: none; }
    .slide.enter-left { transform: translateX(-50px); opacity: 0; pointer-events: none; }

    .option-card:hover { background: var(--card-hover); border-color: var(--card-hover-border); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
    .option-card.selected { background: var(--card-sel); border-color: var(--card-sel-border); box-shadow: 0 2px 12px rgba(88,44,131,0.10); }

    .dropdown-wrap { position: relative; margin-bottom: 18px; }

      background-repeat: no-repeat; background-position: right 12px center;

    .input-hint { font-size: 12px; color: var(--text-3); margin-top: 4px; }
    .input-field {

      border-radius: 10px; font-size: 15px; font-family: inherit; color: var(--text);
      transition: border-color 0.2s;
    }
    .input-field:focus { outline: none; border-color: var(--purple); box-shadow: 0 0 0 3px rgba(88,44,131,0.1); }
    .input-field::placeholder { color: var(--text-3); }

    .distance-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .distance-mode { font-size: 14px; font-weight: 500; min-width: 140px; }
    .distance-mode .mode-icon { font-size: 18px; margin-right: 6px; }
    .distance-input {

      border-radius: 10px; font-size: 15px; font-family: inherit; color: var(--text); text-align: center;
    }

    .hidden { display: none !important; }

</head>

  {id:'train',  icon:'🚆', label:'Tåg / Pendeltåg'},
  {id:'metro',  icon:'🚇', label:'Tunnelbana / Spårvagn'},
  {id:'bike',   icon:'🚲', label:'Cykel'},
  {id:'ebike',  icon:'⚡', label:'Elcykel / Elsparkcykel'},
  {id:'walk',   icon:'🚶', label:'Gång'},
  {id:'mc',     icon:'🏍️', label:'MC / Moped'},
  {id:'ferry',  icon:'⛴️', label:'Färja'}
];
const FUEL_TYPES = ['Bensin','Diesel','Hybrid (HEV)','Laddhybrid (PHEV)','Elbil (BEV)','Biogas / CNG','E85 / Etanol'];
const CAR_SIZES = [
  {v:'small', l:'Liten (t.ex. VW Polo)'},
  {v:'medium', l:'Mellanstor (t.ex. Volvo V60)'},
  {v:'large', l:'Stor (t.ex. Volvo XC90)'}
];
const CARPOOL_OPTS = [
  {v:'1', l:'Nej, kör ensam'},
  {v:'2', l:'Ja, 2 personer totalt'},
  {v:'3', l:'Ja, 3 personer totalt'},
  {v:'4', l:'Ja, 4+ personer totalt'}
];

const EF = {
  car: { Bensin: {small:0.14, medium:0.17, large:0.21}, Diesel: {small:0.12, medium:0.15, large:0.19},
    'Hybrid (HEV)': {small:0.10, medium:0.12, large:0.15}, 'Laddhybrid (PHEV)': {small:0.06, medium:0.08, large:0.10},
    'Elbil (BEV)': {small:0.02, medium:0.02, large:0.03}, 'Biogas / CNG': {small:0.06, medium:0.08, large:0.10},
    'E85 / Etanol': {small:0.10, medium:0.12, large:0.15} },
  bus: 0.068, train: 0.006, metro: 0.004, bike: 0, ebike: 0.005, walk: 0,
  mc: { Bensin: 0.11, El: 0.02 }, ferry: 0.19
};

const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbwhfq-1XT_WcIdPCrQK-MhFzzPYuGDcE_WPia8HhclMEh1YCdb_gAorGX-pS38so9emPg/exec';

let answers = {};
let cur = 0;
const TOTAL_STEPS = 5;

function el(id) { return document.getElementById(id); }

function updateProgress() {
  const pct = cur === 0 ? 0 : Math.round((cur / (TOTAL_STEPS - 1)) * 100);
  el('progressFill').style.width = pct + '%';
  el('progress').classList.toggle('visible', cur > 0);
  el('header').classList.toggle('visible', cur > 0);
  el('stepLabel').textContent = cur > 0 && cur < TOTAL_STEPS - 1 ? `Steg ${cur} av ${TOTAL_STEPS - 2}` : '';
  el('navBar').style.display = cur === 0 || cur >= TOTAL_STEPS ? 'none' : 'flex';
  el('backBtn').style.visibility = cur <= 1 ? 'hidden' : 'visible';
}

function updateNext() {
  const btn = el('nextBtn');
  const label = el('nextLabel');
  if (cur === TOTAL_STEPS - 1) {
    label.textContent = '✓ Skicka in';
    btn.disabled = false;
    return;
  }
  let ok = false;
  if (cur === 1) ok = !!answers.office && !!answers.commute_days;
  else if (cur === 2) ok = (answers.transport_modes || []).length > 0;
  else if (cur === 3) ok = true;
  else ok = true;
  label.textContent = 'Nästa';
  btn.disabled = !ok;
}

function render() {
  const vp = el('viewport');
  const existing = vp.querySelector('.slide.active');
  if (existing) {
    existing.classList.remove('active');
    existing.classList.add('exit-left');
    setTimeout(() => existing.remove(), 400);
  }

  const slide = document.createElement('div');
  slide.className = 'slide enter-right';
  const inner = document.createElement('div');
  inner.className = 'slide-inner';

  if (cur === 0) renderIntro(inner);
  else if (cur === 1) renderOffice(inner);
  else if (cur === 2) renderTransport(inner);
  else if (cur === 3) renderVehicle(inner);
  else if (cur === 4) renderSummary(inner);
  else renderThankYou(inner);

  slide.appendChild(inner);
  vp.appendChild(slide);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      slide.classList.remove('enter-right');
      slide.classList.add('active');
    });
  });
  updateProgress();
  updateNext();
}

function goBack() {
  if (cur <= 0) return;
  const vp = el('viewport');
  const existing = vp.querySelector('.slide.active');
  if (existing) {
    existing.classList.remove('active');
    existing.classList.add('exit-right');
    setTimeout(() => existing.remove(), 400);
  }
  cur--;
  if (cur === 3 && !needsVehicleDetails()) cur--;
  const slide = document.createElement('div');
  slide.className = 'slide enter-left';
  const inner = document.createElement('div');
  inner.className = 'slide-inner';

  if (cur === 0) renderIntro(inner);
  else if (cur === 1) renderOffice(inner);
  else if (cur === 2) renderTransport(inner);
  else if (cur === 3) renderVehicle(inner);
  else if (cur === 4) renderSummary(inner);

  slide.appendChild(inner);
  vp.appendChild(slide);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      slide.classList.remove('enter-left');
      slide.classList.add('active');
    });
  });
  updateProgress();
  updateNext();
}

function goNext() {
  if (cur === TOTAL_STEPS - 1) { submitAndFinish(); return; }
  cur++;
  if (cur === 3 && !needsVehicleDetails()) cur++;
  render();
}

function needsVehicleDetails() {
  const modes = answers.transport_modes || [];
  return modes.includes('car') || modes.includes('mc');
}

function renderIntro(c) {
  c.innerHTML = `
    <div class="intro-slide">
      <div class="intro-logo">
        <svg viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg" style="height:44px; width:auto;">
          <!-- Möbius ribbon approximation -->
          <g transform="translate(70,2)">
            <path d="M30 28c-8-14-24-14-24 0s16 14 24 0c8-14 24-14 24 0s-16 14-24 0z" stroke="url(#intro_gt)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <defs><linearGradient id="intro_gt" x1="6" y1="10" x2="54" y2="46"><stop offset="0%" stop-color="#9B6FC2"/><stop offset="40%" stop-color="#582C83"/><stop offset="100%" stop-color="#3D1D5C"/></linearGradient></defs>
          </g>
          <text x="100" y="52" text-anchor="middle" font-family="'DM Sans', sans-serif" font-weight="700" font-size="14" fill="#1A1A2E" letter-spacing="0.5">GRANT THORNTON</text>
        </svg>
      </div>
      <div class="intro-icon">
        <div class="intro-icon-ring"></div>
        <div class="intro-icon-inner">🚲</div>
      </div>
      <div class="intro-eyebrow">GHG Protocol · Scope 3 · Kategori 7</div>
      <h1 class="intro-title">Pendlingsenkät</h1>
      <p class="intro-desc">Hjälp oss kartlägga pendlingsrelaterade utsläpp. Svaren används för att beräkna Scope 3-utsläpp enligt GHG-protokollets distance-based method. Tar ca 3 minuter.</p>
      <button class="start-btn" onclick="cur=1; render();">
        <span>Starta enkäten</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </button>
      <div class="intro-trust">
        <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> Anonymt</span>
        <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> ~3 min</span>
      </div>
    </div>`;
}

function renderOffice(c) {
  c.innerHTML = `
    <div class="q-category">Kontor & bakgrund</div>
    <h2 class="q-title">Var jobbar du och hur ser din pendling ut?</h2>
    <p class="q-desc">Välj ditt primära kontor och ange grunduppgifter om dina arbetsdagar.</p>

    <div class="dropdown-wrap">
      <label class="dropdown-label">Kontor <span class="req">*</span></label>
      <select class="dropdown-select" id="officeSelect" onchange="answers.office=this.value; updateNext();">
        <option value="">Välj kontor...</option>
        ${OFFICES.map(o => `<option value="${o}" ${answers.office===o?'selected':''}>${o}</option>`).join('')}
      </select>
    </div>

    <div class="dropdown-wrap">
      <label class="dropdown-label">Avdelning</label>
      <select class="dropdown-select" id="deptSelect" onchange="answers.department=this.value;">
        <option value="">Välj avdelning...</option>
        ${DEPARTMENTS.map(d => `<option value="${d}" ${answers.department===d?'selected':''}>${d}</option>`).join('')}
      </select>
    </div>

    <div class="input-wrap">
      <label class="input-label">Anställningsgrad (%)</label>
      <input type="number" class="input-field" placeholder="100" min="10" max="100" value="${answers.employment_pct||''}"
        oninput="answers.employment_pct=this.value;">
    </div>

    <div class="dropdown-wrap">
      <label class="dropdown-label">Pendlingsdagar per vecka <span class="req">*</span></label>
      <select class="dropdown-select" id="daysSelect" onchange="answers.commute_days=this.value; updateNext();">
        <option value="">Välj...</option>
        ${[1,2,3,4,5].map(d => `<option value="${d}" ${answers.commute_days==d?'selected':''}>${d} dag${d>1?'ar':''}</option>`).join('')}
      </select>
      <div class="input-hint">Dagar du fysiskt åker till kontoret</div>
    </div>

    <div class="input-wrap">
      <label class="input-label">Arbetsveckor per år</label>
      <input type="number" class="input-field" placeholder="47" min="20" max="52" value="${answers.work_weeks||''}"
        oninput="answers.work_weeks=this.value;">
      <div class="input-hint">Typiskt 46\u201348 (exkl. semester)</div>
    </div>`;
}

function renderTransport(c) {
  const modes = answers.transport_modes || [];
  c.innerHTML = `
    <div class="q-category">Transportmedel</div>
    <h2 class="q-title">Hur tar du dig till jobbet?</h2>
    <p class="q-desc">Välj alla transportmedel du använder. Du kan välja flera om du kombinerar (t.ex. bil + tåg).</p>
    <div class="cards-grid" id="transportGrid">
      ${TRANSPORT_MODES.map(m => `
        <div class="option-card ${modes.includes(m.id)?'selected':''}" data-id="${m.id}" onclick="toggleTransport('${m.id}', this)">
          <span class="card-icon">${m.icon}</span>
          <span class="card-label">${m.label}</span>
          <span class="multi-check"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
        </div>
      `).join('')}
    </div>
    <div id="distanceFields" style="margin-top:24px;"></div>`;
  renderDistanceFields();
}

function toggleTransport(id, el) {
  let modes = answers.transport_modes || [];
  if (modes.includes(id)) modes = modes.filter(m => m !== id);
  else modes.push(id);
  answers.transport_modes = modes;
  el.classList.toggle('selected');
  renderDistanceFields();
  updateNext();
}

function renderDistanceFields() {
  const modes = answers.transport_modes || [];
  const container = document.getElementById('distanceFields');
  if (!container) return;
  if (modes.length === 0) { container.innerHTML = ''; return; }
  if (!answers.distances) answers.distances = {};
  container.innerHTML = `
    <div class="q-desc" style="margin-bottom:16px; font-weight:500; color:var(--text);">Enkel sträcka per transportmedel (km)</div>
    ${modes.map(id => {
      const m = TRANSPORT_MODES.find(t => t.id === id);
      return `<div class="distance-row">
        <span class="distance-mode"><span class="mode-icon">${m.icon}</span> ${m.label}</span>
        <input type="number" class="distance-input" placeholder="0" min="0" step="0.5"
          value="${answers.distances[id]||''}"
          oninput="answers.distances['${id}']=parseFloat(this.value)||0;">
        <span class="distance-unit">km</span>
      </div>`;
    }).join('')}`;
}

function renderVehicle(c) {
  const modes = answers.transport_modes || [];
  const hasCar = modes.includes('car');
  const hasMC = modes.includes('mc');

  let html = `
    <div class="q-category">Fordonsdetaljer</div>
    <h2 class="q-title">Berätta mer om ditt fordon</h2>
    <p class="q-desc">Kompletterande information om motorfordon. Behövs för korrekta emissionsfaktorer.</p>`;

  if (hasCar) {
    html += `
      <div class="dropdown-label" style="margin-bottom:12px;">Drivmedel <span class="req">*</span></div>
      <div class="pill-group" id="fuelGroup">
        ${FUEL_TYPES.map(f => `<span class="pill ${answers.car_fuel===f?'selected':''}" onclick="selectPill('car_fuel','${f}',this,'fuelGroup')">${f}</span>`).join('')}
      </div>

      <div class="dropdown-label" style="margin-bottom:12px;">Bilstorlek</div>
      <div class="pill-group" id="sizeGroup">
        ${CAR_SIZES.map(s => `<span class="pill ${answers.car_size===s.v?'selected':''}" onclick="selectPill('car_size','${s.v}',this,'sizeGroup')">${s.l}</span>`).join('')}
      </div>

      <div class="dropdown-wrap">
        <label class="dropdown-label">Samåker du? <span class="req">*</span></label>
        <select class="dropdown-select" onchange="answers.carpool=this.value;">
          ${CARPOOL_OPTS.map(o => `<option value="${o.v}" ${answers.carpool===o.v?'selected':''}>${o.l}</option>`).join('')}
        </select>
      </div>

      <div class="input-wrap">
        <label class="input-label">Andel samåkningsdagar (%)</label>
        <input type="number" class="input-field" placeholder="0" min="0" max="100" value="${answers.carpool_pct||''}"
          oninput="answers.carpool_pct=this.value;">
        <div class="input-hint">Hur ofta av dina bildagar</div>
      </div>`;
  }

  if (hasMC) {
    html += `
      <div class="dropdown-label" style="margin-top:24px; margin-bottom:12px;">MC/Moped: drivmedel</div>
      <div class="pill-group" id="mcFuelGroup">
        <span class="pill ${answers.mc_fuel==='Bensin'?'selected':''}" onclick="selectPill('mc_fuel','Bensin',this,'mcFuelGroup')">Bensin</span>
        <span class="pill ${answers.mc_fuel==='El'?'selected':''}" onclick="selectPill('mc_fuel','El',this,'mcFuelGroup')">El</span>
      </div>`;
  }

  html += `
    <div class="info-box" style="margin-top:24px;">
      <strong>Varför frågar vi om drivmedel och samåkning?</strong><br>
      GHG-protokollet kräver att utsläpp beräknas per passagerare-kilometer och transportmedel.
      Samåkning minskar per-capita-utsläppen proportionellt.
    </div>`;

  c.innerHTML = html;
}

function selectPill(key, val, elem, groupId) {
  answers[key] = val;
  document.querySelectorAll(`#${groupId} .pill`).forEach(p => p.classList.remove('selected'));
  elem.classList.add('selected');
}

function renderSummary(c) {
  const modes = answers.transport_modes || [];
  const days = parseInt(answers.commute_days) || 0;
  const weeks = parseInt(answers.work_weeks) || 47;
  const distances = answers.distances || {};
  const carpoolPersons = parseInt(answers.carpool) || 1;
  const carpoolPct = parseInt(answers.carpool_pct) || 0;

  let totalCO2 = 0;
  const rows = [];

  modes.forEach(id => {
    const km = distances[id] || 0;
    if (km <= 0) return;
    let ef = 0;
    const m = TRANSPORT_MODES.find(t => t.id === id);

    if (id === 'car') {
      const fuel = answers.car_fuel || 'Bensin';
      const size = answers.car_size || 'medium';
      ef = (EF.car[fuel] && EF.car[fuel][size]) || 0.17;
      const soloFraction = 1 - (carpoolPct / 100);
      const poolFraction = carpoolPct / 100;
      const effectiveEF = ef * (soloFraction + poolFraction / carpoolPersons);
      ef = effectiveEF;
    } else if (id === 'mc') {
      ef = EF.mc[answers.mc_fuel || 'Bensin'] || 0.11;
    } else {
      ef = EF[id] || 0;
    }

    const annual = km * 2 * days * weeks * ef;
    totalCO2 += annual;
    rows.push({ icon: m.icon, label: m.label, km, days, co2: annual });
  });

  c.innerHTML = `
    <div class="q-category">Sammanfattning</div>
    <h2 class="q-title">Granska dina svar</h2>
    <p class="q-desc">Utsläppen beräknas enligt GHG Protocol distance-based method.</p>

    <div class="summary-card">
      <div class="summary-total">
        <div class="summary-total-num">${Math.round(totalCO2)}</div>
        <div class="summary-total-label">kg CO\u2082e / år (uppskattning)</div>
      </div>
      ${rows.length > 0 ? `
      <table class="summary-table">
        <thead><tr><th>Transportmedel</th><th>Enkel sträcka</th><th>Dagar/v</th><th style="text-align:right">kg CO\u2082e/år</th></tr></thead>
        <tbody>
          ${rows.map(r => `<tr>
            <td class="mode-col">${r.icon} ${r.label}</td>
            <td>${r.km} km</td>
            <td>${r.days}</td>
            <td class="num-col">${Math.round(r.co2)}</td>
          </tr>`).join('')}
        </tbody>
      </table>` : '<p style="padding:20px; text-align:center; color:var(--text-3);">Inga transportmedel med sträcka angivna.</p>'}
    </div>

    <div class="info-box">
      <strong>Beräkningsmetod:</strong> CO\u2082e = sträcka (km) \u00d7 2 (tur/retur) \u00d7 dagar/vecka \u00d7 veckor/år \u00d7 emissionsfaktor (kg CO\u2082e/pkm).
      Emissionsfaktorer baserade på svenska genomsnittsvärden (Naturvårdsverket / DEFRA 2024).
      Samåkning justerar bilutsläpp med 1/antal passagerare.
    </div>`;
}

async function submitAndFinish() {
  const btn = el('nextBtn');
  btn.disabled = true;
  el('nextLabel').textContent = 'Skickar...';

  const modes = answers.transport_modes || [];
  const days = parseInt(answers.commute_days) || 0;
  const weeks = parseInt(answers.work_weeks) || 47;
  const distances = answers.distances || {};

  let totalCO2 = 0;
  const modeDetails = [];
  modes.forEach(id => {
    const km = distances[id] || 0;
    let ef = 0;
    if (id === 'car') {
      const fuel = answers.car_fuel || 'Bensin';
      const size = answers.car_size || 'medium';
      ef = (EF.car[fuel] && EF.car[fuel][size]) || 0.17;
      const carpoolPersons = parseInt(answers.carpool) || 1;
      const carpoolPct = parseInt(answers.carpool_pct) || 0;
      const soloFraction = 1 - (carpoolPct / 100);
      const poolFraction = carpoolPct / 100;
      ef = ef * (soloFraction + poolFraction / carpoolPersons);
    } else if (id === 'mc') {
      ef = EF.mc[answers.mc_fuel || 'Bensin'] || 0.11;
    } else {
      ef = EF[id] || 0;
    }
    const annual = km * 2 * days * weeks * ef;
    totalCO2 += annual;
    modeDetails.push(`${id}:${km}km:${Math.round(annual)}kg`);
  });

  const payload = {
    timestamp: new Date().toISOString(),
    office: answers.office || '',
    department: answers.department || '',
    employment_pct: answers.employment_pct || '100',
    commute_days: answers.commute_days || '',
    work_weeks: answers.work_weeks || '47',
    transport_modes: modes.join(', '),
    distances_km: modes.map(id => `${id}:${distances[id]||0}`).join(', '),
    car_fuel: answers.car_fuel || '',
    car_size: answers.car_size || '',
    carpool: answers.carpool || '1',
    carpool_pct: answers.carpool_pct || '0',
    mc_fuel: answers.mc_fuel || '',
    mode_details: modeDetails.join(', '),
    total_co2e_kg: Math.round(totalCO2),
  };

  try {
    if (SHEETS_URL && SHEETS_URL !== '%%GOOGLE_SHEETS_URL%%') {
      await fetch(SHEETS_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    }
  } catch (e) {
    console.warn('Sheet submission error:', e);
  }

  cur = TOTAL_STEPS;
  render();
}

function renderThankYou(c) {
  c.innerHTML = `
    <div class="thanks-wrap">
      <div class="thanks-icon">✅</div>
      <h1 class="thanks-title">Tack för ditt svar!</h1>
      <p class="thanks-desc">Din pendlingsdata har registrerats och kommer att inkluderas i klimatberäkningen enligt GHG Protocol Scope 3 Kategori 7.</p>
      <button class="start-btn" onclick="answers={}; cur=0; render();">
        <span>Skicka in nytt svar</span>
      </button>
      <p class="thanks-method">
        Metodik enligt GHG Protocol, Technical Guidance, Chapter 7: Employee Commuting.<br>
        Distance-based method · Scope 3 Kategori 7 · Emissionsfaktorer: Naturvårdsverket / DEFRA 2024
      </p>
      <div class="thanks-powered">
        Powered by Bardo
      </div>
    </div>`;
  el('navBar').style.display = 'none';
}

render();
</script>
